services:
  postgres:
    image: postgres:16-alpine
    container_name: hook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hook}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hook}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: hook-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-hook}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npm run prisma:migrate:deploy --workspace=@apps/api &&
             npm run start:prod --workspace=@apps/api"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: hook-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    container_name: hook-nginx
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
