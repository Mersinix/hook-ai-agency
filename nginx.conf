upstream hook_web {
    server web:5000;
}

upstream hook_api {
    server api:3001;
}

# HTTP (for certbot + redirect)
server {
    listen 80;
    server_name hook.tn www.hook.tn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name hook.tn www.hook.tn;

    ssl_certificate /etc/letsencrypt/live/hook.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hook.tn/privkey.pem;

    location /api/ {
        proxy_pass http://hook_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /docs/ {
        proxy_pass http://hook_api/docs/;
    }

    location / {
        proxy_pass http://hook_web/;
    }
}
